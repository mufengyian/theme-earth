<th:fragment="siteStats">
  <div class="rounded-xl border border-gray-100 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
    <h2 class="mb-3 flex items-center gap-2 text-base font-semibold text-gray-900 dark:text-slate-50">
      <span class="icon-[tabler--chart-bar] text-blue-500"></span>
      <span th:text="#{widget.siteStats.title}"></span>
    </h2>
    <div class="flex flex-col items-center gap-2 py-2">
      <div class="text-4xl font-bold text-amber-600 dark:text-amber-400" id="site-stats-days">--</div>
      <div class="text-sm text-gray-500 dark:text-slate-400" th:text="#{widget.siteStats.days}"></div>
      <div class="mt-1 text-xs text-gray-400 dark:text-slate-500" th:if="${statistics?.posts != null}" th:text="|文章 ${statistics.posts} · 评论 ${statistics.comments} · 访问 ${statistics.visits}|"></div>
    </div>
  </div>
  <div th:if="${theme.config.sidebar?.widgets != null}" th:each="w : ${theme.config.sidebar.widgets}" th:with="opt=${w.options}">
    <div th:if="${w.value == 'site-stats' and opt?.start_date != null}" data-site-start th:attr="data-site-start=${opt.start_date}" class="hidden"></div>
  </div>
  <script is:inline>
    (function(){
      var daysEl = document.getElementById("site-stats-days");
      if (!daysEl) return;
      var src = document.querySelector("[data-site-start]");
      var startDate = src ? src.getAttribute("data-site-start") : (window.siteStartDate || "2024-01-01");
      var diff = Math.floor((Date.now() - new Date(startDate).getTime()) / 86400000);
      daysEl.textContent = diff > 0 ? diff : 0;
    })();
  </script>
</th:fragment>
